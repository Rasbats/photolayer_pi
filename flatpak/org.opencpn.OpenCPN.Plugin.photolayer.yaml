id: org.opencpn.OpenCPN.Plugin.photolayer
runtime: org.opencpn.OpenCPN
# runtime-version: stable   # official build at flathub
runtime-version: stable
sdk: org.freedesktop.Sdk//24.08
build-extension: true
separate-locales: false
appstream-compose: false
finish-args:
    - --socket=x11
    - --socket=pulseaudio
    - --filesystem=home
    - --device=all

modules:
    - name: proj-8
      sources:
          - type: archive
            url: https://download.osgeo.org/proj/proj-8.2.1.tar.gz
            sha256: 69d881cf6e883623bd18e2a6e02ac34ef27db1a9ee68b09961d13703c0862002 
      config-opts:
          - --prefix=/app/extensions/photolayer
    - name: libgeotiff
      sources:
          - type: archive
            url: https://github.com/OSGeo/libgeotiff/releases/download/1.7.4/libgeotiff-1.7.4.tar.gz
            sha256: c598d04fdf2ba25c4352844dafa81dde3f7fd968daa7ad131228cd91e9d3dc47
            subdir: libgeotiff
      config-opts:
          - --with-proj=/app/extensions/photolayer
          - --prefix=/app/extensions/photolayer
    - name: photolayer
      no-autogen: true
      buildsystem: cmake
      config-opts:
          - -DCMAKE_INSTALL_PREFIX=/app/extensions/photolayer/
          - -DCMAKE_BUILD_TYPE:STRING=Release
          - -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
          - -DBUILD_TYPE:STRING=tarball
          - -Uplugin_target
      build-options:
          cxxflags: -DFLATPAK
          cflags: -DFLATPAK
      sources:
          - type: git
            url: ..
            branch: flatpak-work
